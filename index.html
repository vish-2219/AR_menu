<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#14213D;
overflow:hidden;
color:white;
}
model-viewer::part(default-ar-button){
display:none;
}

/* 3D viewer */

model-viewer{
width:100%;
height:75vh;
background:#14213D;
}

/* logo */

.logo{
position:absolute;
top:15px;
right:15px;
width:65px;
z-index:10;
}

/* AR button */

.arbutton{
position:absolute;
bottom:120px;
right:50%;
transform:translateX(-50%);
background:#FCA311;
color:black;
padding:12px 20px;
border-radius:30px;
font-size:14px;
border:none;
cursor:pointer;
z-index:10;
}

/* menu container */

.menu{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
text-align:center;
width:90%;
max-width:350px;
}

/* navigation row */

.nav{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-bottom:10px;
}

button{
background:black;
color:white;
border:none;
width:38px;
height:38px;
font-size:18px;
cursor:pointer;
}

/* item name */

#name{
font-size:22px;
font-weight:600;
}

/* description */

#desc{
margin-top:8px;
font-size:15px;
line-height:1.4;
color:#E5E5E5;
}

</style>
</head>

<body>

<img class="logo" src="Screenshot (345).png">

<model-viewer
id="viewer"
src="cheese6.glb"
ar
ar-modes="scene-viewer webxr quick-look"
ar-placement="floor"
camera-controls
shadow-intensity="1"
environment-image="neutral">
</model-viewer>

<button class="arbutton" onclick="viewer.activateAR()">
View in AR
</button>

<div class="menu">

<div class="nav">
<button id="prev"><</button>
<div id="name">Cheesecake</div>
<button id="next">></button>
</div>

<div id="desc">
A classic baked cheesecake with a smooth, creamy texture
</div>

</div>

<script>

let current=0
let startX=0
let endX=0

const models=[
"cheese6.glb",
"chocom.glb",
"redvelvet2mb.glb",
"donut.glb",
"cdonut.glb"
]

const names=[
"Cheesecake",
"Chocolate Pastry",
"Red Velvet",
"Donut",
"Cream Donut"
]

const descriptions=[
"A classic baked cheesecake with a smooth, creamy texture",
"Rich chocolate pastry topped with smooth ganache",
"A soft red velvet pastry layered with cream cheese frosting",
"A fluffy glazed donut with a soft bite",
"A donut filled with sweet cream filling"
]

const viewer=document.getElementById("viewer")

function updateItem(){

viewer.src=models[current]

document.getElementById("name").innerText=names[current]

document.getElementById("desc").innerText=descriptions[current]

}

function nextItem(){

current=(current+1)%models.length

updateItem()

}

function prevItem(){

current=(current-1+models.length)%models.length

updateItem()

}

document.getElementById("next").onclick=nextItem
document.getElementById("prev").onclick=prevItem

/* swipe support */

viewer.addEventListener("touchstart",(e)=>{
startX=e.touches[0].clientX
})

viewer.addEventListener("touchend",(e)=>{
endX=e.changedTouches[0].clientX

if(startX-endX>50){
nextItem()
}

if(endX-startX>50){
prevItem()
}

})

</script>

</body>
</html>
