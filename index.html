<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:white;
}

.logo{
position:absolute;
top:15px;
right:15px;
width:90px;
z-index:10;
}

.menu{
position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
color:white;
padding:12px 20px;
border-radius:10px;
font-size:20px;
z-index:10;
text-align:center;
}

button{
font-size:22px;
background:black;
color:white;
border:none;
padding:6px 12px;
cursor:pointer;
}

#desc{
display:none;
background:white;
color:black;
padding:10px;
margin-top:8px;
border-radius:6px;
}

model-viewer{
width:100%;
height:85vh;
}

</style>
</head>

<body>

<img class="logo" src="Screenshot (345).png">

<model-viewer
id="viewer"
src="cheese6.glb"
ar
ar-modes="scene-viewer webxr quick-look"
ar-placement="floor"
camera-controls
shadow-intensity="1"
exposure="1"
scale="0.4 0.4 0.4">
</model-viewer>

<div class="menu">

<button id="prev"><</button>

<span id="name">Cheesecake</span>

<button id="next">></button>

<div id="desc">
Tap pastry name to see description
</div>

</div>

<script>

let current=0

const models=[
"cheese6.glb",
"chocom.glb",
"redvelvet2mb.glb",
"donut.glb",
"cdonut.glb"
]

const names=[
"Cheesecake",
"Chocolate Pastry",
"Red Velvet",
"Donut",
"Cream Donut"
]

const descriptions=[
"Creamy cheesecake pastry",
"Rich chocolate pastry",
"Classic red velvet pastry",
"Soft glazed donut",
"Cream filled donut"
]

const viewer=document.getElementById("viewer")

document.getElementById("next").onclick=()=>{

current=(current+1)%models.length

viewer.src=models[current]

document.getElementById("name").innerText=names[current]

document.getElementById("desc").innerText=descriptions[current]

}

document.getElementById("prev").onclick=()=>{

current=(current-1+models.length)%models.length

viewer.src=models[current]

document.getElementById("name").innerText=names[current]

document.getElementById("desc").innerText=descriptions[current]

}

document.getElementById("name").onclick=()=>{

let d=document.getElementById("desc")

d.style.display=d.style.display==="none"?"block":"none"

}

</script>

</body>
</html>
