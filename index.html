<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#14213D;
overflow:hidden;
}

model-viewer{
width:100%;
height:100vh;
background:#14213D;
transition: transform 0.35s ease;
}

.logo{
position:absolute;
top:15px;
right:15px;
width:70px;
height:auto;
max-width:70px;
object-fit:contain;
z-index:10;
}

.menu{
position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,0.15);
backdrop-filter:blur(8px);
color:white;
padding:12px 20px;
border-radius:10px;
font-size:20px;
z-index:10;
text-align:center;
}

button{
font-size:22px;
background:black;
color:white;
border:none;
padding:6px 12px;
cursor:pointer;
}

#desc{
display:none;
background:white;
color:black;
padding:10px;
margin-top:8px;
border-radius:6px;
}

.arbutton{
position:absolute;
bottom:110px;
right:20px;
background:#FCA311;
color:black;
padding:12px 18px;
border-radius:30px;
font-size:16px;
cursor:pointer;
z-index:10;
}

</style>
</head>

<body>

<img class="logo" src="Screenshot (345).png" alt="logo">

<button id="startAR">Start AR Menu</button>
#startAR{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:16px 28px;
font-size:20px;
background:#FCA311;
border:none;
border-radius:8px;
cursor:pointer;
z-index:20;
}

<model-viewer
id="viewer"
src="cheese6.glb"
ar
ar-modes="scene-viewer webxr quick-look"
ar-placement="floor"
camera-controls
shadow-intensity="1"
exposure="1"
scale="0.4 0.4 0.4"
environment-image="neutral">
</model-viewer>

<button class="arbutton" onclick="viewer.activateAR()">
View in AR
</button>

<div class="menu">

<button id="prev"><</button>

<span id="name">Cheesecake</span>

<button id="next">></button>

<div id="desc">
Tap pastry name to see description
</div>

</div>

<script>

let current=0
let startX=0
let endX=0

const models=[
"cheese6.glb",
"chocom.glb",
"redvelvet2mb.glb",
"donut.glb",
"cdonut.glb"
]

const names=[
"Cheesecake",
"Chocolate Pastry",
"Red Velvet",
"Donut",
"Cream Donut"
]

const descriptions=[
"Creamy cheesecake pastry",
"Rich chocolate pastry",
"Classic red velvet pastry",
"Soft glazed donut",
"Cream filled donut"
]

const viewer=document.getElementById("viewer")

document.getElementById("startAR").onclick = () => {

viewer.activateAR()

document.getElementById("startAR").style.display="none"

}
  
function nextItem(){

viewer.style.transform="translateX(-60px)"

setTimeout(()=>{
current=(current+1)%models.length
viewer.src=models[current]
document.getElementById("name").innerText=names[current]
document.getElementById("desc").innerText=descriptions[current]
viewer.style.transform="translateX(0)"
},200)

}

function prevItem(){

viewer.style.transform="translateX(60px)"

setTimeout(()=>{
current=(current-1+models.length)%models.length
viewer.src=models[current]
document.getElementById("name").innerText=names[current]
document.getElementById("desc").innerText=descriptions[current]
viewer.style.transform="translateX(0)"
},200)

}

document.getElementById("next").onclick=nextItem
document.getElementById("prev").onclick=prevItem

document.getElementById("name").onclick=()=>{
let d=document.getElementById("desc")
d.style.display=d.style.display==="none"?"block":"none"
}

viewer.addEventListener("touchstart",(e)=>{
startX=e.touches[0].clientX
})

viewer.addEventListener("touchend",(e)=>{
endX=e.changedTouches[0].clientX

if(startX-endX>50){
nextItem()
}

if(endX-startX>50){
prevItem()
}

})

</script>

</body>
</html>
